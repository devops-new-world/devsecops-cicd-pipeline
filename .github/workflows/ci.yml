name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write
  security-events: write
  packages: write

env:
  IMAGE_NAME: book-ticketing-app
  REGISTRY: ghcr.io

jobs:

  # ─────────────────────────────────────────────
  # 1. LINT & FORMAT
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install "black==24.4.2" "flake8==7.0.0" "isort==5.13.2"

      - name: Auto-format with black
        run: black src/

      - name: Auto-sort imports
        run: isort --profile black src/

      - name: Commit formatting fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format with black and isort"
          file_pattern: "src/**/*.py"

      - name: Run flake8
        run: flake8 src/

      - name: Check black
        run: black --check src/

      - name: Check isort
        run: isort --profile black --check-only src/

  # ─────────────────────────────────────────────
  # 2. SAST — Bandit + Semgrep
  # ─────────────────────────────────────────────
  sast:
    name: 🔒 SAST Scan
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      # --- Bandit (Python security linter) --------------------------------
      - name: Bandit — Python Security Linter
        run: |
          pip install bandit --break-system-packages
          bandit -r src/ \
            --exclude src/tests \
            -f json \
            -o bandit-report.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      # --- Semgrep --------------------------------------------------------
      # FIX: semgrep/semgrep-action is fully deprecated — v2 does NOT exist.
      #      Run semgrep directly via pip install instead of the action.
      #      --exclude flags prevent scanning venv/ (caused 26 false positives).
      - name: Install Semgrep
        run: pip install semgrep --break-system-packages

      - name: Semgrep — OWASP Rules
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/python \
            --config p/secrets \
            --config p/jwt \
            --sarif \
            --output semgrep.sarif \
            --exclude venv \
            --exclude .venv \
            --exclude node_modules \
            --exclude tests \
            . || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif

  # ─────────────────────────────────────────────
  # 3. DEPENDENCY SCAN — Snyk
  # ─────────────────────────────────────────────
  dependency-scan:
    name: 📦 Dependency Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # FIX: Auto-sanitize requirements.txt before install.
      #      Strips invalid trailing letters e.g. httpx==0.27.0e → httpx==0.27.0
      - name: Sanitize requirements.txt
        run: |
          python3 -c "
          import re
          lines = open('requirements.txt').readlines()
          fixed = []
          for line in lines:
              cleaned = re.sub(r'(==\d+\.\d+\.\d+)[a-zA-Z]\w*', r'\1', line)
              if cleaned != line:
                  print(f'Fixed: {line.strip()} -> {cleaned.strip()}')
              fixed.append(cleaned)
          open('requirements.txt', 'w').writelines(fixed)
          print('Done.')
          "

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # FIX: --package-manager=pip bypasses broken pyproject.toml/Poetry validation
      - name: Snyk vulnerability scan
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >-
            --severity-threshold=high
            --file=requirements.txt
            --package-manager=pip
            --sarif-file-output=snyk.sarif

      # FIX: Guard upload — snyk.sarif only exists if Snyk ran successfully
      - name: Upload Snyk results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('snyk.sarif') != ''
        with:
          sarif_file: snyk.sarif

  # ─────────────────────────────────────────────
  # 4. BUILD & PUSH DOCKER IMAGE
  # ─────────────────────────────────────────────
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: [sast, dependency-scan]
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      # FIX: Normalize to lowercase — Docker registry names must be fully lowercase.
      #      github.repository_owner can contain uppercase (e.g. DevSecOP-CICD-Pipeline)
      - name: Set lowercase image ref
        run: |
          echo "IMAGE_REF=$(echo '${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_REF }}

  # ─────────────────────────────────────────────
  # 5. CONTAINER SCAN — Trivy
  # ─────────────────────────────────────────────
  container-scan:
    name: 🛡️ Trivy Container Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
      packages: read
    steps:
      - uses: actions/checkout@v4

      # FIX: Normalize to lowercase — must match exactly what was pushed in build job
      - name: Set lowercase image ref
        run: |
          echo "IMAGE_REF=$(echo '${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # FIX: Login before pull so docker can authenticate with GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # FIX: Pull image into local Docker daemon BEFORE trivy-action runs.
      #      trivy-action's entrypoint.sh does NOT inherit docker login credentials.
      #      Pulling first puts the image in the local daemon so Trivy finds it
      #      via the "docker" source without needing remote auth.
      - name: Pull image from GHCR
        run: docker pull ${{ env.IMAGE_REF }}

      # Trivy v0.69.3 — safe post-incident release (v0.27–v0.69.1 were deleted
      # in the 2026-03-01 supply chain attack on the Trivy GitHub repo)
      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      # FIX: Guard upload — trivy-results.sarif only exists if Trivy ran successfully
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif

  # ─────────────────────────────────────────────
  # 6. SONARCLOUD — Quality Gate
  # ─────────────────────────────────────────────
  sonarcloud:
    name: 📊 SonarCloud Quality Gate
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # FIX: Replaced deprecated sonarcloud-github-action@master
      #      with sonarqube-scan-action@v5.0.0
      # IMPORTANT: Disable "Automatic Analysis" in SonarCloud UI:
      #   Project -> Administration -> Analysis Method -> toggle OFF
      #   Running both CI + Automatic analysis causes exit code 3.
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
